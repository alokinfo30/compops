<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBOM Explorer - CompOps Platform</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/custom.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <script src="assets/js/app.js"></script>

</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-shield-halved"></i> CompOps
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/sbom-explorer.html">SBOM Explorer</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard.html">Analytics</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="text-light">SBOM Explorer <small class="d-block text-muted">Visualize Component Dependencies</small></h1>
            </div>
        </div>

        <!-- Project Selector -->
        <div class="row g-3 mb-4">
            <div class="col-md-6 col-sm-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0 text-white">Select Project</h4>
                    </div>
                    <div class="card-body">
<label class="form-label text-white">Choose a project to visualize:</label>
                        <select id="project-select" class="form-select  bg-dark mb-3">
                            <option value="">Select a project...</option>
                        </select>
                        <div class="d-flex gap-2">
                            <button onclick="generateSBOM(1, 'cyclonedx')" class="btn btn-primary btn-sm">
                                <i class="fas fa-cube"></i> Generate SBOM
                            </button>
                            <button onclick="exportSBOM(1, 'cyclonedx')" class="btn btn-success btn-sm">
                                <i class="fas fa-download"></i> Export SBOM
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-sm-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0 text-white">Legend</h4>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center">
                                <span class="legend-color me-2" style="background: #9c27b0;"></span>
                                <span class="text-white">Project</span>
                            </div>
                            <div class="d-flex align-items-center">
                                <span class="legend-color me-2" style="background: #4caf50;"></span>
                                <span class="text-white">Component</span>
                            </div>
                            <div class="d-flex align-items-center">
                                <span class="legend-color me-2" style="background: #f44336;"></span>
                                <span class="text-white">Vulnerability</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Graph Visualization -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 text-white">Dependency Graph</h4>
                        <div class="btn-group" role="group">
                            <button class="btn btn-sm btn-outline-secondary" onclick="zoomIn()" title="Zoom In">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="zoomOut()" title="Zoom Out">
                                <i class="fas fa-search-minus"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="resetZoom()" title="Reset">
                                <i class="fas fa-compress-arrows-alt"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="graph-container" style="min-height: 500px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Component Details -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0 text-white">Component Details</h4>
                    </div>
                    <div class="card-body">
                        <div id="component-details" class="text-center text-muted p-4">
                            <i class="fas fa-info-circle fa-2x mb-2"></i>
                            <p>Click on a node to view component details</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
<footer class="mt-4 text-center text-muted">
            <p>&copy; <span id="year"></span> CompOps Platform - Software Supply Chain Security</p>
            <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Global variables
        var svg, g, zoom;
        var currentData = { nodes: [], links: [] };
        
        // Load projects on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadProjects();
            initGraph();
            
            document.getElementById('project-select').addEventListener('change', function() {
                var projectId = this.value;
                if (projectId) {
                    loadGraphData(projectId);
                }
            });
        });
        
        // Load projects for selector
        function loadProjects() {
            fetch('/api/projects')
            .then(function(response) { return response.json(); })
            .then(function(projects) {
                var select = document.getElementById('project-select');
                select.innerHTML = '<option value="">Select a project...</option>';
                
                projects.forEach(function(project) {
                    var option = document.createElement('option');
                    option.value = project.id;
                    option.textContent = project.name;
                    select.appendChild(option);
                });
            })
            .catch(function(error) {
                console.error('Error loading projects:', error);
            });
        }
        
        // Initialize D3 graph
        function initGraph() {
            var container = document.getElementById('graph-container');
            var width = container.clientWidth || 800;
            var height = container.clientHeight || 500;
            
            svg = d3.select('#graph-container')
                .append('svg')
                .attr('width', '100%')
                .attr('height', height)
                .attr('viewBox', [0, 0, width, height]);
            
            zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', function(event) {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            g = svg.append('g');
            
            // Add arrow marker
            svg.append('defs').append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '-0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('orient', 'auto')
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .append('path')
                .attr('d', 'M 0,-5 L 10,0 L 0,5')
                .attr('fill', '#999');
        }
        
        // Load graph data
        function loadGraphData(projectId) {
            fetch('/api/sbom/graph/' + projectId)
            .then(function(response) { return response.json(); })
            .then(function(data) {
                currentData = data;
                updateGraph(currentData);
            })
            .catch(function(error) {
                console.error('Error loading graph data:', error);
            });
        }
        
        // Update graph visualization
        function updateGraph(data) {
            if (!data.nodes || data.nodes.length === 0) {
                g.selectAll('*').remove();
                g.append('text')
                    .attr('x', '50%')
                    .attr('y', '50%')
                    .attr('text-anchor', 'middle')
                    .text('No data available. Add a project first.');
                return;
            }
            
            g.selectAll('*').remove();
            
            var container = document.getElementById('graph-container');
            var width = container.clientWidth || 800;
            var height = container.clientHeight || 500;
            
            var simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links).id(function(d) { return d.id; }).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));
            
            var link = g.append('g')
                .selectAll('line')
                .data(data.links)
                .join('line')
                .attr('class', 'link')
                .attr('marker-end', 'url(#arrowhead)');
            
            var node = g.append('g')
                .selectAll('g')
                .data(data.nodes)
                .join('g')
                .attr('class', function(d) { return 'node ' + (d.type || ''); })
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            node.append('circle')
                .attr('r', 15)
                .attr('fill', function(d) {
                    if (d.type === 'project') return '#9c27b0';
                    if (d.type === 'component') return '#4caf50';
                    if (d.type === 'vulnerability') return '#f44336';
                    return '#1976d2';
                });
            
            node.append('text')
                .attr('dx', 20)
                .attr('dy', 5)
                .text(function(d) { return d.name || d.id; })
                .style('font-size', '12px')
                .style('fill', 'white');

            
            node.on('click', function(event, d) {
                showComponentDetails(d);
            });
            
            simulation.on('tick', function() {
                link
                    .attr('x1', function(d) { return d.source.x; })
                    .attr('y1', function(d) { return d.source.y; })
                    .attr('x2', function(d) { return d.target.x; })
                    .attr('y2', function(d) { return d.target.y; });
                
                node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
            });
            
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
        }
        
        // Show component details
        function showComponentDetails(details) {
            var container = document.getElementById('component-details');
            var vulns = details.vulns || [];
            
            container.innerHTML = 
                '<div class="row">' +
                '<div class="col-md-6">' +
                '<p class="text-white" ><strong>Name:</strong> ' + (details.name || details.id) + '</p>' +
                '<p class="text-white"><strong>Type:</strong> ' + (details.type || 'unknown') + '</p>' +
                '</div>' +
                '<div class="col-md-6">' +
                '<p class="text-white"><strong>Vulnerabilities:</strong> ' + vulns.length + '</p>' +
                (vulns.length > 0 ? '<p class="text-white"><strong>CVE IDs:</strong> ' + vulns.join(', ') + '</p>' : '') +
                '</div>' +
                '</div>';
            container.classList.remove('text-center', 'text-muted', 'p-4');
        }
        
        // Zoom functions
        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }
        
        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }
        
        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }

        // Alias for app.js compatibility
        function loadSBOMGraph(projectId) {
            loadGraphData(projectId);
        }
    </script>
    
    <style>
        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .node circle {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
        }
        
        .link {
            stroke: #999;
            stroke-width: 2px;
        }
    </style>
</body>
</html>
