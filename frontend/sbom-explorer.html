<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SBOM Explorer - CompOps Platform</title>
    
    <!-- Metro UI CSS -->
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/v5/css/metro-all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/custom.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="app-bar" data-role="appbar">
        <div class="app-bar-container">
            <a href="#" class="app-bar-toggle" id="nav-toggle">
                <span class="mif-menu"></span>
            </a>
            <a href="/" class="app-bar-brand">
                <i class="fas fa-shield-halved"></i> CompOps
            </a>
            <ul class="app-bar-menu" id="nav-menu">
                <li><a href="/"><i class="fas fa-home"></i> <span class="nav-text">Dashboard</span></a></li>
                <li><a href="/sbom-explorer.html" class="active"><i class="fas fa-project-diagram"></i> <span class="nav-text">SBOM Explorer</span></a></li>
                <li><a href="/dashboard.html"><i class="fas fa-chart-line"></i> <span class="nav-text">Analytics</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid">
        <!-- Header -->
        <div class="row mt-4">
            <div class="cell-12">
                <h1 class="text-light">SBOM Explorer <small class="d-block">Visualize Component Dependencies</small></h1>
            </div>
        </div>

        <!-- Project Selector -->
        <div class="row mt-4">
            <div class="cell-md-6 cell-sm-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Select Project</h4>
                    </div>
                    <div class="card-content p-4">
                        <div class="form-group">
                            <label>Choose a project to visualize:</label>
                            <select id="project-select" class="input">
                                <option value="">Select a project...</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="cell-md-6 cell-sm-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Legend</h4>
                    </div>
                    <div class="card-content p-4">
                        <div class="d-flex flex-wrap">
                            <div class="legend-item m-1">
                                <span class="legend-color" style="background: #9c27b0;"></span>
                                <span>Project</span>
                            </div>
                            <div class="legend-item m-1">
                                <span class="legend-color" style="background: #4caf50;"></span>
                                <span>Component</span>
                            </div>
                            <div class="legend-item m-1">
                                <span class="legend-color" style="background: #f44336;"></span>
                                <span>Vulnerability</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Graph Visualization -->
        <div class="row mt-4">
            <div class="cell-12">
                <div class="card">
                    <div class="card-header d-flex flex-justify-between flex-align-center">
                        <h4 class="card-title">Dependency Graph</h4>
                        <div class="graph-controls">
                            <button class="button small" onclick="zoomIn()">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="button small" onclick="zoomOut()">
                                <i class="fas fa-search-minus"></i>
                            </button>
                            <button class="button small" onclick="resetZoom()">
                                <i class="fas fa-compress-arrows-alt"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-content p-4">
                        <div id="graph-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Component Details -->
        <div class="row mt-4">
            <div class="cell-12">
                <div class="card">
                    <div class="card-header">
                        <h4 class="card-title">Component Details</h4>
                    </div>
                    <div class="card-content p-4">
                        <div id="component-details" class="empty-state">
                            <i class="fas fa-info-circle"></i>
                            <p>Click on a node to view component details</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-4">
            <p>&copy; 2024 CompOps Platform - Software Supply Chain Security</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.metroui.org.ua/v5/css/metro-icons.min.js"></script>
    <script src="https://cdn.metroui.org.ua/v5/js/metro.min.js"></script>
    
    <script>
        // Global variables
        let svg, g, zoom;
        let currentData = { nodes: [], links: [] };
        
        // Mobile navigation toggle
        document.addEventListener('DOMContentLoaded', function() {
            const navToggle = document.getElementById('nav-toggle');
            const navMenu = document.getElementById('nav-menu');
            
            if (navToggle && navMenu) {
                navToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    navMenu.classList.toggle('active');
                });
                
                document.addEventListener('click', function(e) {
                    if (!navToggle.contains(e.target) && !navMenu.contains(e.target)) {
                        navMenu.classList.remove('active');
                    }
                });
            }
            
            // Load projects
            loadProjects();
            
            // Initialize graph
            initGraph();
            
            // Project select change handler
            document.getElementById('project-select').addEventListener('change', function() {
                const projectId = this.value;
                if (projectId) {
                    loadGraphData(projectId);
                }
            });
        });
        
        // Load projects for selector
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                
                const select = document.getElementById('project-select');
                select.innerHTML = '<option value="">Select a project...</option>';
                
                projects.forEach(project => {
                    const option = document.createElement('option');
                    option.value = project.id;
                    option.textContent = project.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading projects:', error);
            }
        }
        
        // Initialize D3 graph
        function initGraph() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight || 500;
            
            svg = d3.select('#graph-container')
                .append('svg')
                .attr('width', '100%')
                .attr('height', height)
                .attr('viewBox', [0, 0, width, height]);
            
            // Add zoom behavior
            zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            g = svg.append('g');
            
            // Add arrow marker for directed edges
            svg.append('defs').append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '-0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('orient', 'auto')
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .append('path')
                .attr('d', 'M 0,-5 L 10,0 L 0,5')
                .attr('fill', '#999');
        }
        
        // Load graph data
        async function loadGraphData(projectId) {
            try {
                const response = await fetch(`/api/sbom/graph/${projectId}`);
                currentData = await response.json();
                updateGraph(currentData);
            } catch (error) {
                console.error('Error loading graph data:', error);
            }
        }
        
        // Update graph visualization
        function updateGraph(data) {
            if (!data.nodes || data.nodes.length === 0) {
                g.selectAll('*').remove();
                g.append('text')
                    .attr('x', '50%')
                    .attr('y', '50%')
                    .attr('text-anchor', 'middle')
                    .text('No data available. Add a project first.');
                return;
            }
            
            // Clear previous graph
            g.selectAll('*').remove();
            
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight || 500;
            
            // Create simulation
            const simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));
            
            // Draw links
            const link = g.append('g')
                .selectAll('line')
                .data(data.links)
                .join('line')
                .attr('class', 'link')
                .attr('marker-end', 'url(#arrowhead)');
            
            // Draw nodes
            const node = g.append('g')
                .selectAll('g')
                .data(data.nodes)
                .join('g')
                .attr('class', d => `node ${d.type}`)
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            node.append('circle')
                .attr('r', 15)
                .attr('fill', d => {
                    switch(d.type) {
                        case 'project': return '#9c27b0';
                        case 'component': return '#4caf50';
                        case 'vulnerability': return '#f44336';
                        default: return '#1976d2';
                    }
                });
            
            node.append('text')
                .attr('dx', 20)
                .attr('dy', 5)
                .text(d => d.name || d.id)
                .style('font-size', '12px');
            
            // Click handler for details
            node.on('click', (event, d) => {
                showComponentDetails(d);
            });
            
            // Update positions on tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            // Drag functions
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
        }
        
        // Show component details
        function showComponentDetails(details) {
            const container = document.getElementById('component-details');
            const vulns = details.vulns || [];
            
            let html = `
                <div class="row">
                    <div class="cell-md-6">
                        <p><strong>Name:</strong> ${details.name || details.id}</p>
                        <p><strong>Type:</strong> ${details.type}</p>
                    </div>
                    <div class="cell-md-6">
                        <p><strong>Vulnerabilities:</strong> ${vulns.length}</p>
                        ${vulns.length > 0 ? `<p><strong>CVE IDs:</strong> ${vulns.join(', ')}</p>` : ''}
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            container.classList.remove('empty-state');
        }
        
        // Zoom functions
        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }
        
        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }
        
        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (currentData.nodes && currentData.nodes.length > 0) {
                updateGraph(currentData);
            }
        });
    </script>
    
    <style>
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .graph-controls {
            display: flex;
            gap: 5px;
        }
        
        @media (max-width: 640px) {
            .legend-item {
                font-size: 0.85rem;
            }
            
            .graph-controls {
                margin-top: 10px;
            }
            
            .card-header {
                flex-direction: column;
                align-items: flex-start !important;
            }
        }
    </style>
</body>
</html>
